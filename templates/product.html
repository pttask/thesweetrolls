{% extends "base.html" %}
{% block title %}The Sweet Rolls - Product{% endblock %}
{% block nav_variant %}nav-dark{% endblock %}

{% block content %}
<section class="product-page-bg py-5 d-flex align-items-center">
    <div class="container py-5">
        <div class="text-center mb-5">
            <h2 class="fw-bold" style="font-family: var(--font-display); font-size: clamp(2rem, 4vw, 2.8rem);">Explore Delicious Taste</h2>
            <div class="mx-auto mt-2" style="width:120px; height:3px; background: var(--tsr-orange); border-radius: 2px;"></div>
        </div>

        <div id="productCarousel" class="carousel slide" data-bs-ride="false">
            <div class="carousel-inner">
                <div class="carousel-item active">
                    <div class="row justify-content-center g-4">
                        {% for p in products %}
                        <div class="col-md-4 col-lg-3">
                            <div class="product-card">
                                <a href="{{ url_for('product_detail', slug=p['slug']) }}">
                                    <img src="{{ url_for('static', filename='images/' + p['image']) }}" alt="{{ p['name'] }}">
                                </a>
                                <h5><a href="{{ url_for('product_detail', slug=p['slug']) }}" class="text-decoration-none text-dark">{{ p['name'] }}</a></h5>
                                <hr style="width:40px; margin: 0.5rem auto; border-top: 2px solid var(--tsr-orange);">
                                <p class="product-price mb-3">Rp {{ '{:,}'.format(p['price']).replace(',', '.') }}</p>
                                <form action="{{ url_for('cart_add') }}" method="post">
                                    <input type="hidden" name="product_id" value="{{ p['id'] }}">
                                    <input type="hidden" name="qty" value="1">
                                    <button type="submit" class="btn btn-tsr-dark w-100">Buy Now</button>
                                </form>
                            </div>
                        </div>
                        {% endfor %}
                    </div>
                </div>
            </div>
        </div>

        <div class="d-flex justify-content-center gap-2 mt-5">
            <span class="rounded-circle" style="width:10px; height:10px; background: var(--tsr-orange); display:inline-block;"></span>
        </div>
    </div>
</section>
{% endblock %}
